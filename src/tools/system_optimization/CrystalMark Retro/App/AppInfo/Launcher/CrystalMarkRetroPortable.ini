[Launch]
ProgramExecutable=CrystalMarkRetro\CrystalMarkRetro32.exe
ProgramExecutable64=CrystalMarkRetro\CrystalMarkRetro64.exe
ProgramExecutableARM64=CrystalMarkRetro\CrystalMarkRetroA64.exe
WorkingDirectory=%PAL:AppDir%\CrystalMarkRetro
DirectoryMoveOK=yes
SupportsUNC=yes

[DirectoriesMove]
CrystalMarkRetroConfig=%APPDATA%\CrystalMarkRetro

[FileWrite1]
Type=INI
File=%PAL:DataDir%\CrystalMarkRetroConfig\CrystalMarkRetro.ini
Section=Setting
Key=Language
Value=%PAL:LanguageCustom%

[Language]
Base=%PortableApps.comLocaleName%
CheckIfExists=%PAL:AppDir%\CrystalMarkRetro\Resource\Language\%PAL:LanguageCustom%.lang
DefaultIfNotExists=English

[LanguageStrings]
EnglishGB=English
PortugueseBR=Portuguese
SimpChinese=Simplified Chinese
SpanishInternational=Spanish
TradChinese=Traditional Chinese

[LanguageFile]
Type=INI
File=%PAL:DataDir%\CrystalMarkRetroConfig\CrystalMarkRetro.ini
Section=Setting
Key=Language